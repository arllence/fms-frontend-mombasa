<div class="animated fadeIn">
  <!-- <div class="card"> -->
     <!-- <div class="card-header nrb-btn-dark-success">
      RAPID RESULTS INITIATIVE Thematic Areas / Project Goals
     </div> -->
     <!-- <div class="card-body table-responsive"> -->
      
      <div class="d-flex mb-3">
        <div class="me-auto p-2">
          <h6 class="dark-green fw-bolder"><i class="fa fa-calendar text-dark"></i> &nbsp;{{get_todays_date() |date}}</h6>
        </div>
        <div class="p-2">
          <div class="form-group">
            <!-- <select   class="form-control p-2">
              <option value="today">TODAY</option>
              <option value="this_week">THIS WEEK</option>
              <option value="this_month">THIS MONTH</option>
              <option value="this_term" selected>THIS TERM</option>
              <option value="date_range">DATE RANGE</option>
            </select> -->
          </div>
        </div>
        <div class="p-2" *ngIf="activate_date_range">
          <form [formGroup]="FilterForm">
            <div class="form-group">
              <input type="date" formControlName="range_start_date" class="form-control">
            </div>
          </form>
        </div>
        <div class="p-2" *ngIf="activate_date_range">
          <form [formGroup]="FilterForm" >
            <div class="form-group">
              <input type="date" formControlName="range_end_date" class="form-control">
            </div>
          </form>
        </div>
        <div class="p-2">
          <form [formGroup]="FilterForm">
            <div class="form-group">
              <!-- <select class="form-control p-2" formControlName="accountType" >
                <option [value]="item?.id" *ngFor="let item of account_types">{{item?.account_type_name}}</option>
              </select> -->
            </div>
          </form>
        </div>
        <div class="p-2">
          <button type="button" class="btn text-white nrb-btn-dark-success" (click)="goto_projects()" >
            <i class="fa fa-plus"></i> Add Project
          </button>
        </div>
        <div class="p-2">
          <button type="button" class="btn text-white nrb-btn-dark-success" (click)="goto_objectives()" >
            <i class="fa fa-plus"></i> Add Objective
          </button>
        </div>
      </div>

      <div class="row mb-2">
        <div class="col-md-3 col-sm-12 pointer" (click)="goto_projects()">
          <div class="stat-card link d-flex flex-column shadow-sm cursor-pointer">
            <div class="pb-3 flex-grow-1 d-flex align-items-center">
              <i class="fa fa-thumb-tack borde dark-green rounded-circl p-2 border-dar text-dar fs-3 me-2"></i>
              <span class="fw-semibold fs-5">Main Projects</span>
            </div>
            <div class="d-flex align-items-center border-top pt-4 flex-grow-1">
              <span class="flex-grow-1 fw-bold fs-4">{{generals?.main_projects}}</span>
              <img src="/assets/img/icons/dashboard-arrow.svg" alt="" height="24" width="24">
            </div>
          </div>
        </div>
        <div class="col-md-3 col-sm-12 pointer" (click)="goto_projects()">
          <div class="stat-card link d-flex flex-column shadow-sm cursor-pointer">
            <div class="pb-3 flex-grow-1 d-flex align-items-center">
              <i class="fa fa-thumb-tack borde dark-green rounded-circl p-2 border-dar text-dar fs-3 me-2"></i>
              <span class="fw-semibold fs-5">Sub Projects</span>
            </div>
            <div class="d-flex align-items-center border-top pt-4 flex-grow-1">
              <span class="flex-grow-1 fw-bold fs-4">{{generals?.sub_projects}}</span>
              <img src="/assets/img/icons/dashboard-arrow.svg" alt="" height="24" width="24">
            </div>
          </div>
        </div>
        <div class="col-md-3 col-sm-12 pointer" (click)="goto_objectives()">
          <div class="stat-card link d-flex flex-column shadow-sm cursor-pointer">
            <div class="pb-3 flex-grow-1 d-flex align-items-center">
              <i class="fa fa-thumb-tack borde dark-green rounded-circl p-2 border-dar text-dar fs-3 me-2"></i>
              <span class="fw-semibold fs-5">Objectives</span>
            </div>
            <div class="d-flex align-items-center border-top pt-4 flex-grow-1">
              <span class="flex-grow-1 fw-bold fs-4">{{generals?.objectives}}</span>
              <img src="/assets/img/icons/dashboard-arrow.svg" alt="" height="24" width="24">
            </div>
          </div>
        </div>
        <div class="col-md-3 col-sm-12 pointer" (click)="goto_goals()">
          <div class="stat-card link d-flex flex-column shadow-sm cursor-pointer">
            <div class="pb-3 flex-grow-1 d-flex align-items-center">
              <i class="fa fa-thumb-tack bord dark-green rounded-circ p-2 border-dar text-dar fs-3 me-2"></i>
              <span class="fw-semibold fs-5">Goals</span>
            </div>
            <div class="d-flex align-items-center border-top pt-4 flex-grow-1">
              <span class="flex-grow-1 fw-bold fs-4">{{generals?.goals}}</span>
              <img src="/assets/img/icons/dashboard-arrow.svg" alt="" height="24" width="24">
            </div>
          </div>
        </div>
      </div>


     <!-- </div> -->
  <!-- </div> -->
</div>
