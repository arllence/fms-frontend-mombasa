        <table class="table table-striped table-bordered table-hover row-border" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" >
          <thead>
            <tr>
                <th width="40%" colspan="2">RRI Goal</th>
                <th>Evaluator</th>
                <th>Total Score</th>
                <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let goal of goals; let i = index">    
              <td>{{i+1}}</td>       
              <td>{{ goal?.rri_goal?.goal }}</td>            
              <td>{{ goal?.evaluator?.first_name }} {{ goal?.evaluator?.last_name }}</td> 
              <td>{{ goal?.data?.total }} / 107</td>                           
              <td>
                <c-dropdown>
                  <button cButton cDropdownToggle color="success">
                    Actions
                  </button>
                  <ul cDropdownMenu>
                    <li><span class="pointer px-2" (click)="view_evaluated(goal?.rri_goal?.id)">Detailed</span></li>
                  </ul>
                </c-dropdown>
              </td>                           
            </tr>
          </tbody>
        </table>
