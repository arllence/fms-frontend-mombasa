<style>
  .nav-tabs{
    background-color: nrb-btn-dark-success !important;
  }
</style>
<div class="animated fadeIn">
  <div class="card mb-3">
     <div class="card-header nrb-btn-dark-success">
      <i class="fa fa-clipboard"></i> &nbsp; <strong>Goal Evalution Report</strong>
      <span class="pointer float-end text-white" (click)="back_btn()">
        <span class="fa fa-arrow-left   " ></span>
        &nbsp;<b>Back</b>
     </span>
     </div>
     <div class="card-body table-responsive">
        <table class="table table-striped table-bordered table-hover row-border pt-3 mb-2" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" >
          <thead>
            <tr>
                <th width="40%" colspan="2">RRI Goal</th>
                <th>Evaluators</th>
                <th class="text-center">Average Score</th>
                <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let goal of goals; let i = index">    
              <td>{{i+1}}</td>       
              <td>{{ goal?.goal }}</td>            
              <td>
                <table class="table table-striped table-bordered row-border" width="100%">
                  <tr>
                    <th></th>
                    <th>Name</th>
                    <th class="text-center">Score</th>
                  </tr>
                  <tr *ngFor="let item of goal?.evaluation; let i=index">
                    <td>{{i+1}}.</td>
                    <td>{{ item?.evaluator?.first_name }} {{ item?.evaluator?.last_name }}</td>
                    <td class="text-center">{{item?.data?.total }}</td>
                  </tr>
                </table>
              </td> 
              <td class="text-center">{{ goal?.evaluation_analytics?.average_score }} / 107</td>                           
              <td>
                <c-dropdown>
                  <button cButton cDropdownToggle color="success">
                    Actions
                  </button>
                  <ul cDropdownMenu>
                    <li><span class="pointer px-2" (click)="view_evaluated(goal?.id)">Detailed</span></li>
                  </ul>
                </c-dropdown>
              </td>                           
            </tr>
          </tbody>
          <h6 class="text-danger py-3" *ngIf="goals?.length == 0">No data found !</h6>
        </table>
        </div>
        </div>
        </div>
